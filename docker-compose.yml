services:
  research-claw:
    image: ghcr.io/wentorai/research-claw:latest
    build:
      context: .
      # 海外用户取消注释以使用默认源（跳过中国镜像）：
      # args:
      #   APT_MIRROR: deb.debian.org
      #   NPM_REGISTRY: https://registry.npmjs.org
      # 构建时代理（如果你的网络需要翻墙拉 GitHub 依赖，取消注释）
      #   HTTP_PROXY: http://host.docker.internal:7890
      #   HTTPS_PROXY: http://host.docker.internal:7890
    ports:
      - "127.0.0.1:28789:28789"
    environment:
      - OPENCLAW_GATEWAY_TOKEN=research-claw
      # 运行时代理（如果你的 LLM API 需要代理，取消注释下面两行）
      # - HTTP_PROXY=http://host.docker.internal:7890
      # - HTTPS_PROXY=http://host.docker.internal:7890
    # ── Volumes (CRITICAL: all 4 required for data persistence) ──────
    # The docker-install script does `docker rm` on every update.
    # Any path NOT on a named volume is DESTROYED on container recreation.
    # v0.5.2 bug: rc-state was missing → chat history lost on every update.
    volumes:
      - rc-config:/app/config            # API key, gateway config, .config-version
      - rc-data:/app/.research-claw      # RC plugin SQLite (library, tasks, monitors)
      - rc-workspace:/app/workspace      # Agent workspace (MEMORY.md, USER.md, files)
      - rc-state:/root/.openclaw         # OC state: sessions (chat history!), logs, plugins, credentials
      # ── Reference manager databases (read-only) ────────────────────
      # Zotero/EndNote import from Docker. If the host path doesn't exist,
      # Docker creates an empty directory — no error, import returns empty.
      # macOS / Linux (default — safe to leave enabled):
      - ~/Zotero:/host/zotero:ro
      - ~/Documents:/host/documents:ro
      # Windows (WSL2 backend) — uncomment these, comment out the above:
      #   - /mnt/c/Users/YOUR_USER/Zotero:/host/zotero:ro
      #   - /mnt/c/Users/YOUR_USER/Documents:/host/documents:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf --noproxy '*' http://127.0.0.1:28789/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

# ── Volume names MUST match docker-install.sh / docker-install.ps1 ──────
# Without explicit `name:`, Compose prefixes with project name
# (e.g. "research-claw_rc-config") which creates ISOLATED volumes
# from the bare "rc-config" used by docker-install scripts.
# This caused silent data loss when switching between compose and scripts.
volumes:
  rc-config:
    name: rc-config
  rc-data:
    name: rc-data
  rc-workspace:
    name: rc-workspace
  rc-state:
    name: rc-state
